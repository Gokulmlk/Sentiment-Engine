# Development configuration
environment: development
debug: true

database:
  url: "sqlite:///sentiment_engine_dev.db"
  echo: true

processing:
  max_queue_size: 1000
  batch_size: 25
  processing_interval: 0.5

signals:
  buy_threshold: 0.2
  sell_threshold: -0.2
  confidence_threshold: 0.3
  cooldown_minutes: 2

logging:
  level: "DEBUG"
  file: "logs/development.log"

data_sources:
  mock_data: true
  twitter_enabled: false
  reddit_enabled: false
  news_enabled: false
configs/production.yml
# Production configuration
environment: production
debug: false

database:
  pool_size: 50
  max_overflow: 100
  echo: false

processing:
  max_queue_size: 5000
  batch_size: 100
  processing_interval: 0.05
  worker_threads: 8

signals:
  buy_threshold: 0.4
  sell_threshold: -0.4
  confidence_threshold: 0.6
  cooldown_minutes: 5

logging:
  level: "INFO"
  file: "logs/production.log"
  max_bytes: 50485760  # 50MB
  backup_count: 10

data_sources:
  mock_data: false
  twitter_enabled: true
  reddit_enabled: true
  news_enabled: true
  rate_limits:
    twitter: 300
    reddit: 100
    news: 5000